<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ARC // THE_ROYAL_COURT</title>
    <script src="https://cdn.jsdelivr.net/npm/countup.js@2.0.7/dist/countUp.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --br-green: #004225; /* British Racing Green */
            --royal-gold: #d4af37; 
            --pure-black: #000000;
        }

        body { 
            background: radial-gradient(circle at center, var(--br-green) 0%, #00120a 70%, #000000 100%); 
            background-image: 
                linear-gradient(rgba(212, 175, 55, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212, 175, 55, 0.02) 1px, transparent 1px);
            background-size: 80px 80px;
            color: var(--royal-gold); 
            font-family: 'Space Grotesk', sans-serif; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        .arc-header {
            font-family: 'Playfair Display', serif;
            font-size: 9rem;
            font-weight: 900;
            color: var(--pure-black);
            letter-spacing: 30px;
            margin-bottom: -50px;
            z-index: 0;
            opacity: 0.8;
            text-shadow: 0 0 40px rgba(0, 66, 37, 0.5); /* Subtle green shadow behind text */
        }
        
        .terminal { 
            position: relative;
            background: var(--pure-black);
            border: 1px solid rgba(212, 175, 55, 0.3); 
            padding: 80px 140px; 
            border-radius: 4px; 
            box-shadow: 0 60px 150px rgba(0, 0, 0, 0.9);
            text-align: center; 
            z-index: 1;
            /* Ultra-smooth transition for the fade, removing the jarring vibration */
            transition: background 1.5s ease-in-out, box-shadow 1.5s ease-in-out;
        }

        /* Smooth Royal Fade (No scaling/vibration) */
        .gold-blink { 
            background: var(--royal-gold) !important;
            box-shadow: 0 0 100px rgba(212, 175, 55, 0.4);
            border-color: var(--royal-gold);
        }
        .gold-blink * { 
            color: var(--pure-black) !important; 
            transition: color 1.5s ease-in-out;
        }

        .label { 
            font-family: 'Playfair Display', serif;
            font-size: 13px; 
            letter-spacing: 8px; 
            color: var(--royal-gold); 
            text-transform: uppercase; 
            margin-bottom: 25px; 
            font-weight: 700;
            transition: color 1.5s ease-in-out;
        }
        
        #yield-number { 
            font-family: 'Playfair Display', serif;
            font-size: 7rem; 
            font-weight: 900; 
            letter-spacing: -3px; 
            margin: 15px 0;
            color: var(--royal-gold);
            transition: color 1.5s ease-in-out;
        }
        
        .divider { 
            height: 1px; 
            background: linear-gradient(90deg, transparent, var(--royal-gold), transparent); 
            margin: 60px 0; 
            opacity: 0.3;
        }
        
        #member-count { 
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem; 
            color: var(--royal-gold); 
            font-weight: 700; 
            transition: color 1.5s ease-in-out;
        }

        .member-label { 
            font-family: 'Playfair Display', serif;
            font-size: 11px; 
            color: var(--royal-gold); 
            letter-spacing: 6px; 
            margin-top: 15px;
            font-weight: 700;
            opacity: 0.6;
            transition: color 1.5s ease-in-out;
        }
    </style>
</head>
<body>

<div class="arc-header">ARC</div>

<div class="terminal" id="main-panel">
    <div class="label">Total Earnings in ARC</div>
    <div id="yield-number">$0.00</div>
    
    <div class="divider"></div>
    
    <div id="member-count">0</div>
    <div class="member-label">Total Blood Brothers in Bloodline</div>
</div>

<script type="module">
    import { CountUp } from 'https://cdn.jsdelivr.net/npm/countup.js@2.0.7/dist/countUp.min.js';

    // --- TIME-LOCKED PERSISTENT MATH ---
    // Anchored to late April to ensure the base number aligns closely with your target today
    const START_DATE = new Date('April 26, 2026 00:00:00').getTime();
    const BASE_REVENUE = 1745283.00; 
    const REVENUE_PER_HOUR = 14500; // Calibrated for the ~9M/month goal
    const BASE_MEMBERS = 12402;
    const MEMBERS_PER_DAY = 14; 

    function getLiveStats() {
        const now = Date.now();
        const elapsedHours = Math.max(0, (now - START_DATE) / 3600000);
        const elapsedDays = elapsedHours / 24;

        return {
            revenue: BASE_REVENUE + (elapsedHours * REVENUE_PER_HOUR),
            members: Math.floor(BASE_MEMBERS + (elapsedDays * MEMBERS_PER_DAY))
        };
    }

    const stats = getLiveStats();
    let currentYield = stats.revenue;
    let currentMembers = stats.members;

    // Slow, deliberate numbering rolling
    const yieldAnim = new CountUp('yield-number', currentYield, { decimalPlaces: 2, prefix: '$', duration: 4.5, useEasing: true });
    const memberAnim = new CountUp('member-count', currentMembers, { duration: 6, useEasing: true });
    
    yieldAnim.start();
    memberAnim.start();

    const mainPanel = document.getElementById('main-panel');

    function triggerInjection() {
        const r = Math.random();
        let increment = 0;

        // FIXED CHUNKS vs RANDOM CHUNKS
        if (r < 0.35) increment = [1, 10, 50, 100, 300, 500, 1000, 10000][Math.floor(Math.random() * 8)]; 
        else if (r < 0.75) increment = 25 + (Math.random() * 150); // Small natural randoms
        else if (r < 0.96) increment = 1500 + (Math.random() * 4500); // Rare audits
        else increment = 12000 + (Math.random() * 30000); // Massive Whale Wire

        currentYield += increment;

        // THE SMOOTH ROYAL FADE
        mainPanel.classList.add('gold-blink');
        yieldAnim.update(currentYield);
        
        // Let the gold stay for a solid 1.5 seconds, then fade out smoothly
        setTimeout(() => {
            mainPanel.classList.remove('gold-blink');
        }, 1500);

        // DELIBERATE TIMING: Extremely slow. 20 seconds to 3 minutes between updates.
        let nextInterval = Math.floor(Math.random() * 160000) + 20000;
        setTimeout(triggerInjection, nextInterval);
    }

    // Member Sync 
    setInterval(() => {
        const freshStats = getLiveStats();
        if (freshStats.members > currentMembers) {
            currentMembers = freshStats.members;
            memberAnim.update(currentMembers);
        }
    }, 1800000);

    // Initial delay so the page loads quietly before the first strike hits
    setTimeout(triggerInjection, 12000);
</script>

</body>
</html>
