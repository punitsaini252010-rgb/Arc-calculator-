<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ARC // THE_ROYAL_COURT</title>
    <script src="https://cdn.jsdelivr.net/npm/countup.js@2.0.7/dist/countUp.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --br-green: #004225; /* Pure British Racing Green */
            --royal-gold: #d4af37; /* Pure Gold */
            --pure-black: #000000;
        }

        body { 
            background-color: var(--br-green); 
            background-image: 
                linear-gradient(rgba(212, 175, 55, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212, 175, 55, 0.03) 1px, transparent 1px);
            background-size: 100px 100px; /* Elegant silk grid */
            color: var(--royal-gold); 
            font-family: 'Space Grotesk', sans-serif; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        /* Fixed at the absolute top, Massive 3D Pure Gold */
        .arc-header {
            position: absolute;
            top: 25px; 
            font-family: 'Playfair Display', serif;
            font-size: 7.5rem; 
            font-weight: 900;
            color: var(--royal-gold); 
            letter-spacing: 30px; 
            
            /* The 3D Extrusion Effect: Stacking darker shades of gold downwards */
            text-shadow: 
                0 1px 0 #c4a132, 
                0 2px 0 #b5942e, 
                0 3px 0 #a6882a, 
                0 4px 0 #967a26, 
                0 5px 0 #876e22, 
                0 6px 0 #78621e, 
                0 7px 0 #68551a, 
                0 8px 0 #594816,
                0 15px 25px rgba(0, 0, 0, 0.9), /* Heavy drop shadow directly below */
                0 30px 60px rgba(0, 0, 0, 0.95); /* Deep ambient shadow for the floating effect */
            z-index: 0;
        }
        
        .terminal { 
            position: relative;
            background: var(--pure-black);
            border: 1px solid rgba(212, 175, 55, 0.4); 
            padding: 90px 150px; 
            border-radius: 2px; 
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.95);
            text-align: center; 
            z-index: 1;
            transition: background 1.5s ease-in-out, box-shadow 1.5s ease-in-out;
            margin-top: 140px; /* Lowered so the massive 3D text doesn't overlap it */
        }

        /* Smooth Royal Fade */
        .gold-blink { 
            background: var(--royal-gold) !important;
            box-shadow: 0 0 150px rgba(212, 175, 55, 0.5);
            border-color: var(--royal-gold);
        }
        .gold-blink * { 
            color: var(--pure-black) !important; 
            transition: color 1.5s ease-in-out;
        }

        .label { 
            font-family: 'Playfair Display', serif;
            font-size: 14px; 
            letter-spacing: 8px; 
            color: var(--royal-gold); 
            text-transform: uppercase; 
            margin-bottom: 30px; 
            font-weight: 700;
            transition: color 1.5s ease-in-out;
        }
        
        #yield-number { 
            font-family: 'Playfair Display', serif;
            font-size: 7.5rem; 
            font-weight: 900; 
            letter-spacing: -3px; 
            margin: 20px 0;
            color: var(--royal-gold);
            transition: color 1.5s ease-in-out;
        }
        
        .divider { 
            height: 1px; 
            background: linear-gradient(90deg, transparent, var(--royal-gold), transparent); 
            margin: 60px 0; 
            opacity: 0.3;
        }
        
        #member-count { 
            font-family: 'Playfair Display', serif;
            font-size: 3rem; 
            color: var(--royal-gold); 
            font-weight: 700; 
            transition: color 1.5s ease-in-out;
        }

        .member-label { 
            font-family: 'Playfair Display', serif;
            font-size: 12px; 
            color: var(--royal-gold); 
            letter-spacing: 6px; 
            margin-top: 15px;
            font-weight: 700;
            opacity: 0.7;
            transition: color 1.5s ease-in-out;
        }
    </style>
</head>
<body>

<div class="arc-header">ARC</div>

<div class="terminal" id="main-panel">
    <div class="label">Total Earnings in ARC</div>
    <div id="yield-number">$1,745,283.00</div>
    
    <div class="divider"></div>
    
    <div id="member-count">12,402</div>
    <div class="member-label">Total Blood Brothers in Bloodline</div>
</div>

<script type="module">
    import { CountUp } from 'https://cdn.jsdelivr.net/npm/countup.js@2.0.7/dist/countUp.min.js';

    // --- STRICT BOUNDARY LOCK MATH ---
    const START_DATE = new Date('April 26, 2026 00:00:00').getTime();
    const BASE_REVENUE = 1745283.00; 
    const REVENUE_PER_HOUR = 6944.44; // Exactly locked to a $5,000,000 monthly cap
    const BASE_MEMBERS = 12402;
    const MEMBERS_PER_DAY = 12; // Exclusive, steady growth

    function getLiveStats() {
        const now = Date.now();
        const elapsedHours = Math.max(0, (now - START_DATE) / 3600000);
        const elapsedDays = elapsedHours / 24;

        return {
            revenue: BASE_REVENUE + (elapsedHours * REVENUE_PER_HOUR),
            members: Math.floor(BASE_MEMBERS + (elapsedDays * MEMBERS_PER_DAY))
        };
    }

    const stats = getLiveStats();
    let currentYield = stats.revenue;
    let currentMembers = stats.members;

    // StartVal ensures it loads instantly at the correct number, never starting from zero
    const yieldAnim = new CountUp('yield-number', currentYield, { 
        startVal: currentYield, 
        decimalPlaces: 2, 
        prefix: '$', 
        duration: 3, 
        useEasing: true 
    });
    
    const memberAnim = new CountUp('member-count', currentMembers, { 
        startVal: currentMembers, 
        duration: 3, 
        useEasing: true 
    });
    
    yieldAnim.start();
    memberAnim.start();

    const mainPanel = document.getElementById('main-panel');

    function triggerInjection() {
        // FETCH THE ABSOLUTE TRUTH: Pull the exact math for this specific millisecond
        const freshStats = getLiveStats();
        
        // Update visual directly from timeline. No fake stacking.
        currentYield = freshStats.revenue;

        // THE SMOOTH ROYAL FADE
        mainPanel.classList.add('gold-blink');
        yieldAnim.update(currentYield);
        
        setTimeout(() => {
            mainPanel.classList.remove('gold-blink');
        }, 1500);

        // DELIBERATE TIMING
        // Because the revenue grows strictly by ~$1.92 per second...
        // A 15-second wait creates a ~$28 jump. A 90-second wait creates a ~$172 jump.
        let nextInterval = Math.floor(Math.random() * 85000) + 10000; // Waits between 10s and 95s
        
        // 10% chance to wait 2 to 5 minutes to build up a bigger "Whale" jump ($230-$575)
        if (Math.random() > 0.90) {
            nextInterval = Math.floor(Math.random() * 180000) + 120000;
        }

        setTimeout(triggerInjection, nextInterval);
    }

    // Member Sync (Checks against elapsed time, no zero-starts)
    setInterval(() => {
        const freshStats = getLiveStats();
        if (freshStats.members > currentMembers) {
            currentMembers = freshStats.members;
            memberAnim.update(currentMembers);
        }
    }, 1800000); // Syncs every 30 mins

    // First visual strike happens quietly after 5 seconds to set the mood
    setTimeout(triggerInjection, 5000);
</script>

</body>
</html>
