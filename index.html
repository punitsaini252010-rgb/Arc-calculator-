<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ARC // SYSTEM_FEED</title>
    <script src="https://cdn.jsdelivr.net/npm/countup.js@2.0.7/dist/countUp.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        
        .terminal { 
            border: 1px solid #00ff41; 
            padding: 50px 80px; 
            border-radius: 20px; 
            background: rgba(0, 255, 65, 0.02); 
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.1); 
            text-align: center; 
            transition: all 0.5s ease;
        }

        /* Pulsing Glow on Win */
        .win-glow { box-shadow: 0 0 60px rgba(0, 255, 65, 0.4); border: 2px solid #00ff41; }

        .label { font-size: 12px; letter-spacing: 6px; color: #00ff41; text-transform: uppercase; margin-bottom: 20px; opacity: 0.7; font-weight: 300; }
        
        #yield-number { font-size: 5rem; font-weight: 900; transition: color 0.2s ease; letter-spacing: -2px; }
        .gold-flash { color: #FFD700 !important; text-shadow: 0 0 40px rgba(255, 215, 0, 0.8) !important; }
        
        .divider { height: 1px; background: linear-gradient(90deg, transparent, #00ff41, transparent); margin: 40px 0; opacity: 0.4; }
        
        #member-count { font-size: 1.8rem; color: #00ff41; font-weight: 700; letter-spacing: 1px; }
        .member-label { font-size: 10px; color: #666; letter-spacing: 3px; margin-top: 8px; }
    </style>
</head>
<body>

<div class="terminal" id="main-panel">
    <div class="label">Total System Yield</div>
    <div id="yield-number">$3,420,891.00</div>
    
    <div class="divider"></div>
    
    <div id="member-count">12,402</div>
    <div class="member-label">ACTIVE ARCHITECTS</div>
</div>

<script type="module">
    import { CountUp } from 'https://cdn.jsdelivr.net/npm/countup.js@2.0.7/dist/countUp.min.js';

    let yieldVal = 3420891.00;
    let memberVal = 12402;

    const yieldDisplay = document.getElementById('yield-number');
    const mainPanel = document.getElementById('main-panel');
    
    const yieldAnim = new CountUp('yield-number', yieldVal, { decimalPlaces: 2, prefix: '$', duration: 1.5, useEasing: true });
    const memberAnim = new CountUp('member-count', memberVal, { duration: 2 });
    
    yieldAnim.start();
    memberAnim.start();

    function triggerUpdate() {
        let increment = 0;
        const r = Math.random();
        
        // HIGHER YIELD LOGIC (Scale for 12k members)
        if (r < 0.60) increment = Math.random() * 150;      // 60% chance: $0-$150
        else if (r < 0.85) increment = Math.random() * 800;  // 25% chance: $150-$800
        else if (r < 0.97) increment = Math.random() * 3500; // 12% chance: $800-$3500
        else increment = 8000 + (Math.random() * 15000);    // 3% chance: WHALE WIN ($8k-$23k)

        yieldVal += increment;
        
        // FLASH EFFECTS
        yieldDisplay.classList.add('gold-flash');
        mainPanel.classList.add('win-glow');
        yieldAnim.update(yieldVal);
        
        setTimeout(() => {
            yieldDisplay.classList.remove('gold-flash');
            mainPanel.classList.remove('win-glow');
        }, 1200);

        // MEMBER LOGIC
        const memberRoll = Math.random();
        if (memberRoll < 0.88) {
            memberVal += Math.floor(Math.random() * 5) + 1; // Gain
        } else {
            memberVal -= Math.floor(Math.random() * 3) + 1; // Churn
        }
        memberAnim.update(memberVal);

        // RANDOM TIMING (Fast Bursts vs Slow Gaps)
        let nextInterval = Math.random() < 0.5 ? (Math.random() * 2000 + 500) : (Math.random() * 25000 + 5000);
        setTimeout(triggerUpdate, nextInterval);
    }

    // First update after 4 seconds
    setTimeout(triggerUpdate, 4000);
</script>

</body>
</html>
