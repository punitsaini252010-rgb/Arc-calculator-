<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ARC // THE_ROYAL_COURT</title>
    <script src="https://cdn.jsdelivr.net/npm/countup.js@2.0.7/dist/countUp.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --royal-green: #0a2e1d; /* Deep Luxurious Emerald */
            --royal-gold: #d4af37;  /* Metallic Gold */
            --pure-black: #050505;
        }

        body { 
            background: var(--royal-green); 
            /* Subtle Silk Pattern */
            background-image: radial-gradient(circle at center, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            color: var(--royal-gold); 
            font-family: 'Space Grotesk', sans-serif; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        /* The Header */
        .arc-header {
            font-family: 'Playfair Display', serif;
            font-size: 8rem;
            font-weight: 900;
            color: var(--pure-black);
            letter-spacing: 20px;
            margin-bottom: -40px;
            z-index: 0;
            opacity: 0.9;
        }
        
        .terminal { 
            position: relative;
            background: var(--pure-black);
            border: 2px solid var(--royal-gold); 
            padding: 80px 120px; 
            border-radius: 10px; /* Sharp, Royal Edges */
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.9);
            text-align: center; 
            z-index: 1;
            transition: background 0.3s ease, transform 0.3s ease;
        }

        /* Gold Blink Effect */
        .gold-blink { 
            background: var(--royal-gold) !important;
            transform: scale(1.01);
        }
        .gold-blink * { color: var(--pure-black) !important; }

        .label { 
            font-family: 'Playfair Display', serif;
            font-size: 14px; 
            letter-spacing: 5px; 
            color: var(--royal-gold); 
            text-transform: uppercase; 
            margin-bottom: 20px; 
            font-weight: 700;
            font-style: italic;
        }
        
        #yield-number { 
            font-family: 'Playfair Display', serif;
            font-size: 6.5rem; 
            font-weight: 900; 
            letter-spacing: -2px; 
            margin: 10px 0;
            color: var(--royal-gold);
        }
        
        .divider { 
            height: 1px; 
            background: linear-gradient(90deg, transparent, var(--royal-gold), transparent); 
            margin: 50px 0; 
            opacity: 0.5;
        }
        
        #member-count { 
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem; 
            color: var(--royal-gold); 
            font-weight: 700; 
        }

        .member-label { 
            font-family: 'Playfair Display', serif;
            font-size: 12px; 
            color: var(--royal-gold); 
            letter-spacing: 4px; 
            margin-top: 15px;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="arc-header">ARC</div>

<div class="terminal" id="main-panel">
    <div class="label">TOTAL EARNINGS IN ARC</div>
    <div id="yield-number">$0.00</div>
    
    <div class="divider"></div>
    
    <div id="member-count">0</div>
    <div class="member-label">TOTAL BLOOD BROTHERS IN BLOODLINE</div>
</div>

<script type="module">
    import { CountUp } from 'https://cdn.jsdelivr.net/npm/countup.js@2.0.7/dist/countUp.min.js';

    // --- ROYAL CONFIGURATION ---
    const START_DATE = new Date('April 1, 2026 00:00:00').getTime();
    const BASE_REVENUE = 2150890.00; // Starting mid-range
    const REVENUE_PER_SECOND = 4.63; // ~12M growth per month target
    const BASE_MEMBERS = 12402;
    const MEMBERS_PER_HOUR = 0.8; // Even slower growth for exclusivity

    function getLiveStats() {
        const now = Date.now();
        const elapsedSeconds = (now - START_DATE) / 1000;
        const elapsedHours = elapsedSeconds / 3600;

        return {
            revenue: BASE_REVENUE + (elapsedSeconds * REVENUE_PER_SECOND),
            members: Math.floor(BASE_MEMBERS + (elapsedHours * MEMBERS_PER_HOUR))
        };
    }

    const stats = getLiveStats();
    let currentYield = stats.revenue;
    let currentMembers = stats.members;

    const yieldAnim = new CountUp('yield-number', currentYield, { decimalPlaces: 2, prefix: '$', duration: 4, useEasing: true });
    const memberAnim = new CountUp('member-count', currentMembers, { duration: 5, useEasing: true });
    
    yieldAnim.start();
    memberAnim.start();

    const mainPanel = document.getElementById('main-panel');

    // --- THE ROYAL INJECTION LOOP ---
    function triggerInjection() {
        const r = Math.random();
        let increment = 0;

        // Randomized Amounts: Fixed vs. Variable
        if (r < 0.15) increment = [10, 50, 100, 300, 500, 1000, 10000][Math.floor(Math.random() * 7)]; // Fixed
        else if (r < 0.80) increment = Math.random() * 200; // Small random
        else if (r < 0.95) increment = 1000 + (Math.random() * 5000); // Rare random
        else increment = 15000 + (Math.random() * 50000); // Whale Injection

        currentYield += increment;

        // Visual Blink
        mainPanel.classList.add('gold-blink');
        yieldAnim.update(currentYield);
        
        setTimeout(() => {
            mainPanel.classList.remove('gold-blink');
        }, 800);

        // Random Timing: 5 seconds to 2 minutes
        let nextInterval = Math.floor(Math.random() * 115000) + 5000;
        setTimeout(triggerInjection, nextInterval);
    }

    // Member update logic (vetted and slow)
    setInterval(() => {
        const freshStats = getLiveStats();
        if (freshStats.members > currentMembers) {
            currentMembers = freshStats.members;
            memberAnim.update(currentMembers);
        }
    }, 600000); // Check every 10 mins

    // Start the cycle
    setTimeout(triggerInjection, 10000);
</script>

</body>
</html>
