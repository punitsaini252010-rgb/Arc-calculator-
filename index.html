<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ARC // THE_ROYAL_COURT</title>
    <script src="https://cdn.jsdelivr.net/npm/countup.js@2.0.7/dist/countUp.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --br-green: #004225; 
            --royal-gold: #d4af37; 
            --pure-black: #000000;
        }

        body { 
            background: radial-gradient(circle at center, var(--br-green) 0%, #001a0f 70%, #000000 100%); 
            background-image: 
                linear-gradient(rgba(212, 175, 55, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212, 175, 55, 0.02) 1px, transparent 1px);
            background-size: 80px 80px;
            color: var(--royal-gold); 
            font-family: 'Space Grotesk', sans-serif; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        .arc-header {
            font-family: 'Playfair Display', serif;
            font-size: 9rem;
            font-weight: 900;
            color: var(--pure-black);
            letter-spacing: 30px;
            margin-bottom: -50px;
            z-index: 0;
            opacity: 0.8;
        }
        
        .terminal { 
            position: relative;
            background: var(--pure-black);
            border: 1px solid var(--royal-gold); 
            padding: 80px 140px; 
            border-radius: 2px; 
            box-shadow: 0 60px 150px rgba(0, 0, 0, 0.9);
            text-align: center; 
            z-index: 1;
            transition: background 0.8s ease, transform 0.5s ease;
        }

        .gold-blink { 
            background: var(--royal-gold) !important;
            box-shadow: 0 0 120px var(--royal-gold);
            transform: scale(1.02);
        }
        .gold-blink * { color: var(--pure-black) !important; }

        .label { 
            font-family: 'Playfair Display', serif;
            font-size: 13px; 
            letter-spacing: 8px; 
            color: var(--royal-gold); 
            text-transform: uppercase; 
            margin-bottom: 25px; 
            font-weight: 700;
        }
        
        #yield-number { 
            font-family: 'Playfair Display', serif;
            font-size: 7rem; 
            font-weight: 900; 
            letter-spacing: -3px; 
            margin: 15px 0;
            color: var(--royal-gold);
        }
        
        .divider { 
            height: 1px; 
            background: linear-gradient(90deg, transparent, var(--royal-gold), transparent); 
            margin: 60px 0; 
            opacity: 0.3;
        }
        
        #member-count { 
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem; 
            color: var(--royal-gold); 
            font-weight: 700; 
        }

        .member-label { 
            font-family: 'Playfair Display', serif;
            font-size: 11px; 
            color: var(--royal-gold); 
            letter-spacing: 6px; 
            margin-top: 15px;
            font-weight: 700;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div class="arc-header">ARC</div>

<div class="terminal" id="main-panel">
    <div class="label">Total Earnings in ARC</div>
    <div id="yield-number">$0.00</div>
    
    <div class="divider"></div>
    
    <div id="member-count">0</div>
    <div class="member-label">Total Blood Brothers in Bloodline</div>
</div>

<script type="module">
    import { CountUp } from 'https://cdn.jsdelivr.net/npm/countup.js@2.0.7/dist/countUp.min.js';

    // --- STEADY PERSISTENT LOGIC ---
    const START_DATE = new Date('April 1, 2026 00:00:00').getTime();
    const BASE_REVENUE = 2150890.00;
    const REVENUE_PER_HOUR = 17500; // Targets the $13M monthly goal but in chunks
    const BASE_MEMBERS = 12402;
    const MEMBERS_PER_DAY = 18; // Very exclusive, slow growth

    function getLiveStats() {
        const now = Date.now();
        const elapsedHours = (now - START_DATE) / 3600000;
        const elapsedDays = elapsedHours / 24;

        return {
            revenue: BASE_REVENUE + (elapsedHours * REVENUE_PER_HOUR),
            members: Math.floor(BASE_MEMBERS + (elapsedDays * MEMBERS_PER_DAY))
        };
    }

    const stats = getLiveStats();
    let currentYield = stats.revenue;
    let currentMembers = stats.members;

    // Longer animation durations for "Heavy" feeling
    const yieldAnim = new CountUp('yield-number', currentYield, { decimalPlaces: 2, prefix: '$', duration: 5 });
    const memberAnim = new CountUp('member-count', currentMembers, { duration: 6 });
    
    yieldAnim.start();
    memberAnim.start();

    const mainPanel = document.getElementById('main-panel');

    function triggerInjection() {
        const r = Math.random();
        let increment = 0;

        // FIXED CHUNKS (Feels more real for high-ticket)
        if (r < 0.30) increment = [50, 100, 500, 1000][Math.floor(Math.random() * 4)];
        else if (r < 0.70) increment = 10 + (Math.random() * 80);
        else if (r < 0.95) increment = 2500 + (Math.random() * 5000); // High ticket audit
        else increment = 15000 + (Math.random() * 45000); // Institutional win

        currentYield += increment;

        // ROYAL FLASH
        mainPanel.classList.add('gold-blink');
        yieldAnim.update(currentYield);
        
        setTimeout(() => {
            mainPanel.classList.remove('gold-blink');
        }, 1200);

        // DELIBERATE TIMING: 20 seconds to 4 minutes between updates
        let nextInterval = Math.floor(Math.random() * 220000) + 20000;
        setTimeout(triggerInjection, nextInterval);
    }

    // Sync Members every 30 minutes
    setInterval(() => {
        const freshStats = getLiveStats();
        if (freshStats.members > currentMembers) {
            currentMembers = freshStats.members;
            memberAnim.update(currentMembers);
        }
    }, 1800000);

    // First win happens after a long wait (15 seconds) to set the pace
    setTimeout(triggerInjection, 15000);
</script>

</body>
</html>
