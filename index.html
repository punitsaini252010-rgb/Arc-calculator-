<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ARC // THE_ROYAL_COURT</title>
    <script src="https://cdn.jsdelivr.net/npm/countup.js@2.0.7/dist/countUp.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --br-green: #004225; /* British Racing Green */
            --royal-gold: #d4af37; 
            --pure-black: #000000;
        }

        body { 
            background: radial-gradient(circle at center, var(--br-green) 0%, #001a0f 70%, #000000 100%); 
            /* Subtle Silk Grid */
            background-image: 
                linear-gradient(rgba(212, 175, 55, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212, 175, 55, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            color: var(--royal-gold); 
            font-family: 'Space Grotesk', sans-serif; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        .arc-header {
            font-family: 'Playfair Display', serif;
            font-size: 9rem;
            font-weight: 900;
            color: var(--pure-black);
            letter-spacing: 25px;
            margin-bottom: -45px;
            z-index: 0;
            opacity: 0.8;
            filter: drop-shadow(0 0 10px rgba(0, 66, 37, 0.5));
        }
        
        .terminal { 
            position: relative;
            background: var(--pure-black);
            border: 1px solid var(--royal-gold); 
            padding: 80px 130px; 
            border-radius: 5px; /* Razor Sharp Royal Edges */
            box-shadow: 0 60px 120px rgba(0, 0, 0, 0.9);
            text-align: center; 
            z-index: 1;
            transition: all 0.4s ease;
        }

        /* The Gold Strike Blink */
        .gold-blink { 
            background: var(--royal-gold) !important;
            box-shadow: 0 0 100px var(--royal-gold);
        }
        .gold-blink * { color: var(--pure-black) !important; }

        .label { 
            font-family: 'Playfair Display', serif;
            font-size: 13px; 
            letter-spacing: 6px; 
            color: var(--royal-gold); 
            text-transform: uppercase; 
            margin-bottom: 25px; 
            font-weight: 700;
            opacity: 0.8;
        }
        
        #yield-number { 
            font-family: 'Playfair Display', serif;
            font-size: 6.8rem; 
            font-weight: 900; 
            letter-spacing: -3px; 
            margin: 15px 0;
            color: var(--royal-gold);
        }
        
        .divider { 
            height: 1px; 
            background: linear-gradient(90deg, transparent, var(--royal-gold), transparent); 
            margin: 50px 0; 
            opacity: 0.4;
        }
        
        #member-count { 
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem; 
            color: var(--royal-gold); 
            font-weight: 700; 
        }

        .member-label { 
            font-family: 'Playfair Display', serif;
            font-size: 11px; 
            color: var(--royal-gold); 
            letter-spacing: 5px; 
            margin-top: 15px;
            font-weight: 700;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="arc-header">ARC</div>

<div class="terminal" id="main-panel">
    <div class="label">Total Earnings in ARC</div>
    <div id="yield-number">$0.00</div>
    
    <div class="divider"></div>
    
    <div id="member-count">0</div>
    <div class="member-label">Total Blood Brothers in Bloodline</div>
</div>

<script type="module">
    import { CountUp } from 'https://cdn.jsdelivr.net/npm/countup.js@2.0.7/dist/countUp.min.js';

    // --- TIME-LOCKED PERSISTENT MATH ---
    const START_DATE = new Date('April 1, 2026 00:00:00').getTime();
    const BASE_REVENUE = 2150890.00; 
    const REVENUE_PER_SECOND = 4.82; // Targets ~$13M monthly growth
    const BASE_MEMBERS = 12402;
    const MEMBERS_PER_HOUR = 0.6; // Ultra-slow exclusive growth

    function getLiveStats() {
        const now = Date.now();
        const elapsedSeconds = (now - START_DATE) / 1000;
        const elapsedHours = elapsedSeconds / 3600;

        return {
            revenue: BASE_REVENUE + (elapsedSeconds * REVENUE_PER_SECOND),
            members: Math.floor(BASE_MEMBERS + (elapsedHours * MEMBERS_PER_HOUR))
        };
    }

    const stats = getLiveStats();
    let currentYield = stats.revenue;
    let currentMembers = stats.members;

    const yieldAnim = new CountUp('yield-number', currentYield, { decimalPlaces: 2, prefix: '$', duration: 3, useEasing: true });
    const memberAnim = new CountUp('member-count', currentMembers, { duration: 5, useEasing: true });
    
    yieldAnim.start();
    memberAnim.start();

    const mainPanel = document.getElementById('main-panel');

    function triggerInjection() {
        const r = Math.random();
        let increment = 0;

        // Royal Injection Distribution
        if (r < 0.20) increment = [1, 10, 50, 100, 300, 500, 1000, 10000][Math.floor(Math.random() * 8)]; 
        else if (r < 0.85) increment = Math.random() * 450; 
        else if (r < 0.98) increment = 2000 + (Math.random() * 8000); 
        else increment = 25000 + (Math.random() * 75000); // Sovereign Strike

        currentYield += increment;

        // The Gold Strike Blink
        mainPanel.classList.add('gold-blink');
        yieldAnim.update(currentYield);
        
        setTimeout(() => {
            mainPanel.classList.remove('gold-blink');
        }, 1000);

        // Truly Random Heartbeat (5s to 90s)
        let nextInterval = Math.floor(Math.random() * 85000) + 5000;
        setTimeout(triggerInjection, nextInterval);
    }

    // Persist the crawl every 100ms
    setInterval(() => {
        currentYield += (REVENUE_PER_SECOND / 10);
        yieldAnim.update(currentYield);
    }, 100);

    // Member sync every 5 minutes
    setInterval(() => {
        const freshStats = getLiveStats();
        if (freshStats.members > currentMembers) {
            currentMembers = freshStats.members;
            memberAnim.update(currentMembers);
        }
    }, 300000);

    setTimeout(triggerInjection, 8000);
</script>

</body>
</html>
